name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: windows-latest
            platform: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: python -m pip install -e ".[build]"
      - run: python build.py

      - name: Stage release binaries
        shell: bash
        run: |
          set -euo pipefail
          version="$(python -c 'from codex_provider_lib.constants import VERSION; print(VERSION)')"
          platform="${{ matrix.platform }}"
          mkdir -p release
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ext=".exe"
          else
            ext=""
          fi
          for name in codex-provider opencode-provider; do
            src="dist/${name}${ext}"
            dest="release/${name}-${version}-${platform}${ext}"
            cp "$src" "$dest"
            python - <<PY
          from pathlib import Path
          import hashlib
          path = Path(r"${dest}")
          digest = hashlib.sha256(path.read_bytes()).hexdigest()
          path.with_suffix(path.suffix + ".sha256").write_text(
              f"{digest}  {path.name}\n", encoding="ascii"
          )
          print(path)
          print(path.with_suffix(path.suffix + ".sha256"))
          PY
          done
          ls -la release

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}
          path: release/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="$(python -c 'from codex_provider_lib.constants import VERSION; print(VERSION)')"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            tag="${{ github.ref_name }}"
          else
            tag="v${version}"
          fi
          if [[ "$tag" != "v${version}" && "$tag" != "$version" ]]; then
            echo "Tag $tag does not match package version v${version}"
            exit 1
          fi
          tag="v${version}"
          ls -la artifacts
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" artifacts/* --clobber
          else
            gh release create "$tag" artifacts/* \
              --title "$tag" \
              --generate-notes \
              --latest
          fi
